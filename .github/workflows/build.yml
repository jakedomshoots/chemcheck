name: Build

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint changed files
        env:
          LINT_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          LINT_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: npm run lint:changed

      - name: Readiness Gates
        run: npm run test:gates

      - name: Check auth bypass flag
        run: |
          if [ "${VITE_IOS_SIM_AUTH_BYPASS}" = "true" ]; then
            echo "ERROR: Auth bypass enabled in CI environment"
            exit 1
          fi

      - name: Build
        run: npm run build
