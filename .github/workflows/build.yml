name: Build

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Readiness Gates
        run: npm run test:gates

      - name: Check auth bypass flag
        run: |
          if [ "${VITE_IOS_SIM_AUTH_BYPASS}" = "true" ]; then
            echo "ERROR: Auth bypass enabled in CI environment"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Deploy Convex functions
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: |
          if [ -z "$CONVEX_DEPLOY_KEY" ]; then
            echo "ERROR: CONVEX_DEPLOY_KEY secret is not configured"
            exit 1
          fi
          npx convex deploy --yes --typecheck try
